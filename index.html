<script>
// ===== CONFIG =====
const API_KEY = 'AIzaSyC5Bc5ie8yo-B98VEP11ehtcNgsOUW2zzc';
const DATA_FILES = [
  'data/나이스_기본업무_안내.txt',
];

// PDF.js 워커 설정
if (typeof pdfjsLib !== 'undefined') {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}

// ===== STATE =====
let messages = [];
let historyList = JSON.parse(localStorage.getItem('neis_history') || '[]');
let knowledgeBase = '';
let uploadedDocs = []; // {name, text} 업로드된 문서 목록
let isLoading = false;

// ===== PDF 파싱 =====
async function parsePDF(arrayBuffer) {
  const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
  let fullText = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(' ');
    fullText += `[${i}페이지] ${pageText}\n`;
  }
  return fullText;
}

// ===== 파일 업로드 처리 =====
async function handleFileUpload(event) {
  const files = Array.from(event.target.files);
  await processFiles(files);
  event.target.value = ''; // 같은 파일 재업로드 가능하도록 초기화
}

async function processFiles(files) {
  for (const file of files) {
    const ext = file.name.split('.').pop().toLowerCase();
    let text = '';
    try {
      updateKbStatus(`⏳ "${file.name}" 처리 중...`);
      if (ext === 'pdf') {
        if (typeof pdfjsLib === 'undefined') { alert('PDF.js 로드 실패. 페이지를 새로고침해 주세요.'); continue; }
        const buf = await file.arrayBuffer();
        text = await parsePDF(buf);
      } else {
        text = await file.text();
      }
      // 중복 파일 체크 후 추가
      const exists = uploadedDocs.find(d => d.name === file.name);
      if (exists) { exists.text = text; }
      else { uploadedDocs.push({ name: file.name, text }); }
      rebuildKnowledgeBase();
      renderUploadedFiles();
    } catch(e) {
      console.error('파일 처리 실패:', file.name, e);
      alert(`"${file.name}" 처리 중 오류: ${e.message}`);
    }
  }
}

function rebuildKnowledgeBase() {
  // 기본 서버 파일 + 업로드 파일 합산 (업로드 파일 우선)
  const parts = uploadedDocs.map(d => `[업로드 파일: ${d.name}]\n${d.text}`);
  const baseText = window._baseKB || '';
  knowledgeBase = (baseText ? [baseText] : []).concat(parts).join('\n\n---\n\n');
  const total = uploadedDocs.length + (baseText ? 1 : 0);
  const countEl = document.getElementById('kb-file-count');
  if (countEl) countEl.textContent = `📂 참고자료 ${total}개`;
  updateKbStatus(`<span class="text-green-400">✅ 지식베이스 ${total}개 준비됨</span>`);
}

function updateKbStatus(html) {
  const el = document.getElementById('kb-status');
  if (el) el.innerHTML = html;
}

function renderUploadedFiles() {
  const container = document.getElementById('uploaded-files');
  if (!uploadedDocs.length) { container.innerHTML = ''; return; }
  container.innerHTML = uploadedDocs.map((d, i) => `
    <div class="kb-file-tag flex items-center gap-2 bg-dark-600 rounded-lg px-2 py-1.5">
      <span class="text-xs">${d.name.endsWith('.pdf') ? '📕' : '📄'}</span>
      <span class="text-xs text-slate-300 truncate flex-1">${d.name}</span>
      <button onclick="removeDoc(${i})" class="text-slate-600 hover:text-red-400 text-xs ml-1 shrink-0">✕</button>
    </div>`).join('');
}

function removeDoc(i) {
  uploadedDocs.splice(i, 1);
  rebuildKnowledgeBase();
  renderUploadedFiles();
  if (!uploadedDocs.length) {
    const countEl = document.getElementById('kb-file-count');
    if (window._baseKB) {
      if (countEl) countEl.textContent = '📂 참고자료 1개';
      updateKbStatus('<span class="text-green-400">✅ 기본 지식베이스 사용 중</span>');
    } else {
      if (countEl) countEl.textContent = '';
      updateKbStatus('<span class="text-yellow-400">⚠️ 내장 지식으로 답변</span>');
    }
  }
}

// ===== 드래그 앤 드롭 =====
function onDragOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('upload-zone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  const files = Array.from(e.dataTransfer.files).filter(f => /\.(pdf|txt|md)$/i.test(f.name));
  if (files.length) processFiles(files);
  else alert('PDF 또는 TXT 파일만 업로드 가능합니다.');
}

// ===== KNOWLEDGE BASE LOADER (서버 파일 대신 내장) =====
async function loadKnowledgeBase() {
  window._baseKB = `===== 나이스(NEIS) 교무업무 처리 안내 =====
※ 이 자료는 초등학교 나이스 교무업무 처리 절차 안내입니다.

----- 1. 출결 관리 (출석부 처리) -----
[메뉴 경로] 나이스 로그인 → 교무업무 → 출결관리 → 일별출결관리
[처리 절차]
1. 나이스(https://neis.go.kr) 에 접속하여 공인인증서 또는 간편인증으로 로그인합니다.
2. 상단 메뉴에서 [교무업무]를 클릭합니다.
3. 좌측 메뉴에서 [출결관리] → [일별출결관리]를 선택합니다.
4. 조회 조건에서 학년, 반, 날짜를 선택하고 [조회] 버튼을 클릭합니다.
5. 학생 목록에서 결석/지각/조퇴/결과(병결, 무단, 기타 등)를 선택하여 입력합니다.
6. 결석 사유는 해당 항목 옆 비고란에 입력합니다.
7. 입력 완료 후 [저장] 버튼을 클릭합니다.
[출결 종류] 결석(무단결석, 병결, 기타결석), 지각, 조퇴, 결과
[유의사항] 질병결석은 의사 진단서/학부모 의견서 첨부. 무단결석 3일 이상 시 교육청 보고.

----- 2. 성적 처리 -----
[메뉴 경로] 나이스 로그인 → 교무업무 → 성적관리 → 단원/수행평가입력 (또는 학기말 성적 처리)
[단원/수행평가 점수 입력 절차]
1. [교무업무] → [성적관리] → [교과학습 발달상황] → [단원평가 점수입력] 선택
2. 학년/반/교과를 선택하고 [조회] 클릭
3. 학생별 점수 입력 후 [저장]
[학기말 성적(통지표) 처리 절차]
1. [교무업무] → [성적관리] → [교과학습발달상황] → [성적일괄입력] 선택
2. 각 교과의 성취도 및 원점수 입력 후 [저장]
[성적 마감 절차] 담임(성적마감신청) → 교무(승인) → 교감/교장(결재)

----- 3. 학적 관리 -----
[메뉴 경로] 나이스 로그인 → 교무업무 → 학적관리
[전입/전출학생 처리 절차]
1. 전입: [교무업무] → [학적관리] → [전입학처리] → 학생 확인 및 반 배정 후 [저장]
2. 전출: [교무업무] → [학적관리] → [전출처리] → 학생 검색 및 전출일/사유 입력 후 [저장]
[학생 기본정보 수정] [학생정보관리]에서 주소/연락처 등 수정 후 [저장]

// ===== 관련 청크 검색 (키워드 기반 RAG) =====
// 전체 지식베이스를 그대로 보내면 토큰 초과 → 질문과 관련된 부분만 추출
function retrieveRelevantChunks(query, maxChars = 4000) {
  if (!knowledgeBase) return '(지식베이스 없음)';

  // 1) 단락 단위로 분할
  const chunks = knowledgeBase
    .split(/\n{2,}|(?=\[파일:|\[업로드 파일:|-----)/)
    .map(c => c.trim())
    .filter(c => c.length > 20);

  // 2) 질문에서 키워드 추출 (2글자 이상 단어)
  const keywords = query
    .replace(/[?！？!]/g, '')
    .split(/\s+/)
    .filter(w => w.length >= 2);

  // 3) 각 청크에 키워드 매칭 점수 부여
  const scored = chunks.map(chunk => {
    const lc = chunk.toLowerCase();
    const score = keywords.reduce((s, kw) => {
      const count = (lc.match(new RegExp(kw.toLowerCase(), 'g')) || []).length;
      return s + count;
    }, 0);
    return { chunk, score };
  });

  // 4) 점수 높은 순으로 정렬, 최대 maxChars까지 합산
  scored.sort((a, b) => b.score - a.score);
  let result = '';
  for (const { chunk, score } of scored) {
    if (score === 0 && result.length > 500) break; // 관련 없는 청크는 패스
    if (result.length + chunk.length > maxChars) break;
    result += chunk + '\n\n';
  }
  return result.trim() || knowledgeBase.substring(0, maxChars);
}

function buildSystemPrompt(query = '') {
  const context = retrieveRelevantChunks(query, 4000);
  return `당신은 대한민국 초등학교 교사를 위한 '나이스 도우미' AI 챗봇입니다.
반드시 아래 [참고 자료] 내용을 기반으로만 답변하세요.
참고 자료에 없는 내용은 "해당 내용은 나이스 매뉴얼이나 교육청 담당자에게 문의하시기 바랍니다."라고 안내하세요.

답변 형식:
1. **메뉴 경로**를 굵게 표시 (예: **나이스 로그인 → 교무업무 → 출결관리 → 일별출결관리**)
2. 단계별 처리 절차를 번호 목록으로 안내
3. 유의사항이 있으면 별도로 명시

[참고 자료]
${context || '(내장 지식으로 답변합니다)'}

[기본 메뉴 경로]

- 창체활동: 교무업무→창의적체험활동
- 학생부: 교무업무→학교생활기록부
- 복무관리: 행정업무→복무관리
- 헬프데스크: 1544-0079`;

// ===== GEMINI API =====
async function callGemini(body, retry = 0) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  const data = await res.json();
  if (data.error) {
    const msg = data.error.message || '';
    // 400: 토큰 초과 또는 잘못된 요청 → 재시도 없이 즉시 오류
    if (res.status === 400) {
      throw new Error('입력 내용이 너무 깁니다. 더 짧은 질문을 시도해 주세요.');
    }
    // 429: 요청 한도 초과 → 최대 2회 재시도
    if (res.status === 429 && retry < 2) {
      const match = msg.match(/retry in ([\d.]+)s/i);
      const wait = match ? Math.ceil(parseFloat(match[1])) + 1 : 10;
      updateTyping(`⏳ API 요청 한도 초과. ${wait}초 후 재시도합니다...`);
      await new Promise(r => setTimeout(r, wait * 1000));
      return callGemini(body, retry + 1);
    }
    // 그 외 오류
    throw new Error(msg || `API 오류 (${res.status})`);
  }
  return data;
}

// ===== CHAT UI =====
function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMsg(role, text) {
  const area = document.getElementById('chat-area');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg-bubble flex gap-3 ${isUser ? 'justify-end' : 'justify-start'}`;
  const formatted = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong class="text-brand-300">$1</strong>')
    .replace(/\n/g,'<br>');
  if (isUser) {
    div.innerHTML = `<div class="max-w-lg bg-gradient-to-br from-brand-600 to-brand-700 text-white text-sm px-4 py-3 rounded-2xl rounded-tr-sm leading-relaxed">${formatted}</div>`;
  } else {
    div.innerHTML = `
      <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0 mt-1">🏫</div>
      <div class="max-w-2xl bg-dark-700 border border-purple-900/30 text-slate-200 text-sm px-4 py-3 rounded-2xl rounded-tl-sm leading-relaxed prose-bot">${formatted}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.id = 'typing-el';
  div.className = 'flex gap-3 items-start';
  div.innerHTML = `
    <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0">🏫</div>
    <div id="typing-content" class="bg-dark-700 border border-purple-900/30 px-4 py-3 rounded-2xl rounded-tl-sm flex gap-1.5 items-center">
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function updateTyping(msg) {
  const el = document.getElementById('typing-content');
  if (el) el.innerHTML = `<span class="text-xs text-slate-400">${msg}</span>`;
}

function hideTyping() {
  const t = document.getElementById('typing-el');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  removeWelcome();
  input.value = '';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text);
  messages.push({ role: 'user', parts: [{ text }] });
  showTyping();

  try {
    const body = {
      system_instruction: { parts: [{ text: buildSystemPrompt(text) }] },
      contents: messages,
      generationConfig: { temperature: 0.2, maxOutputTokens: 1500 }
    };
    const data = await callGemini(body);
    hideTyping();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받을 수 없습니다.';
    messages.push({ role: 'model', parts: [{ text: reply }] });
    appendMsg('bot', reply);
    if (messages.length === 2) saveHistory(text);
  } catch(e) {
    hideTyping();
    appendMsg('bot', `⚠️ 오류: ${e.message}\n\n잠시 후 다시 시도해 주세요.`);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

function sendSuggestion(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

// ===== HISTORY =====
function saveHistory(title) {
  historyList.unshift({ id: Date.now(), title: title.substring(0, 22), msgs: [...messages] });
  if (historyList.length > 30) historyList.pop();
  localStorage.setItem('neis_history', JSON.stringify(historyList));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!historyList.length) {
    list.innerHTML = '<p class="text-xs text-slate-600 px-2 py-2">저장된 대화가 없습니다.</p>';
    return;
  }
  list.innerHTML = historyList.map((h, i) => `
    <div class="history-item flex items-center gap-2 px-3 py-2 rounded-xl cursor-pointer text-xs text-slate-400" onclick="loadHistory(${i})">
      <span class="text-brand-500">💬</span>
      <span class="truncate">${h.title}</span>
    </div>`).join('');
}

function loadHistory(i) {
  const h = historyList[i];
  messages = [...h.msgs];
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  messages.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'bot', m.parts[0].text));
  if (window.innerWidth < 768) closeSidebar();
}
