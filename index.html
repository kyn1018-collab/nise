// ===== KNOWLEDGE BASE LOADER =====
async function loadKnowledgeBase() {
  window._baseKB = `===== 나이스(NEIS) 교무업무 및 진안초등학교 실무 매뉴얼 =====
※ 이 자료는 초등학교 나이스 및 2026학년도 진안초등학교 실제 행정/교무 실무 매뉴얼입니다.

----- 1. 학년초 담임교사 필수 행정 지침 (3.2일 김영남 교사 안내) -----
[나이스 담임 권한 승인 및 기본 세팅]
- 나이스 업무 담임 권한은 학년초 나이스 담당교사(김영남)에 의해 사전 배부됩니다. 다만, 결재권자(교장/교감)의 최종 결재 승인이 완료되어야 실제 나이스상에서 사용 가능합니다.
- 나이스 업무 권한을 개별적으로 확인 후 누락되었거나 필요한 권한이 있는 경우 나이스 담당자에게 즉시 추가 요청하십시오.
- 학부모 서비스 신청이 들어온 경우 담임교사가 직접 승인 처리해 주어야 학부모가 원활히 이용할 수 있습니다.

[학급시간표 및 기본시간표 입력 기한]
- 담임교사는 신학년 시작 후 기본시간표를 먼저 입력한 뒤, 2주차까지 학급시간표 입력을 반드시 완료해야 합니다 (최종 기한: 3월 4일까지).
- 학급시간표 입력이 누락되면 보결(대체수업) 교사 배정이 불가능하므로 기한 준수가 매우 중요합니다.

[반번호 변경 및 전입생 배정 시 절대 주의사항]
- 학년초 학생 전출 및 전입 등으로 인해 학적 반번호를 변경할 때 (기한: 3월 4일까지), 전출생이 빠져나가 빈 번호가 생겼다고 해서 전입생을 그 빈 번호에 당겨서 채워 넣으면 절대로 안 됩니다!
- 전입생은 학년초 반번호 부여 규칙에 따라 맨 마지막 번호 뒤로 배정되어야 합니다.

[학생 인적 사진 등록 및 수정 규격]
- 1학년 (신입생): 입학사진을 새로 등록해야 하며, 규격은 "단색 배경", "모자를 쓰지 않은 상태(탈모)"여야 하고, 깔끔한 증명사진 느낌으로 등록해야 합니다.
- 6학년 (졸업반): 기존 저학년 때 사진을 졸업학년도 규정에 맞게 최신 졸업사진 정보로 일괄 수정/등록해야 합니다.

[학생부 기재요령 핵심 변경 사항]
- 창의적 체험활동 중 '자율활동 누가기록' 및 '자치활동 누가기록' 방법이 전면 변경되었습니다.
- 기존 필수 의무 기록에서 이제는 선택적 기록(선택형)으로 완화 및 변경되었으므로 나이스 입력 시 참고하시기 바랍니다.

[동아리 활동 부서 조직 및 학생 배정]
- 담임교사 또는 동아리 담당교사는 동아리 부서를 먼저 개설(부서 만들기)한 후, 해당 부서로 학생들을 반별로 정확히 배정해야 합니다.

[학년부장 교과편제 관리 지침]
- 학년부장 교사는 **[교무업무] → [교육과정] → [교과편제관리] → [학교교육과정편제및시간배당관리]** 메뉴에서 학년별 교육과정의 연간 시수와 나이스상의 편제 시수가 소수점까지 일치하도록 정밀하게 세팅하고 나이스 시수 매칭을 완료해야 합니다.

----- 2. 시간표 조정 및 학사 변경 실무 (노동절 및 수업 변경) -----
[5월 1일 노동절 행사 처리 요령]
- 5월 1일 근로자의 날(노동절) 학사 일정 처리는 **[교무업무] → [교육과정] → [학급시간표관리]** 메뉴에 접속하여 해당 날짜의 일정을 "행사처리"로 지정하여 저장합니다.

[7월 29일 수업 나이스 변경/삭제 방법]
- 7월 29일(또는 특정 학사변경일)의 등록된 수업을 변경해야 할 경우, 나이스상에서 단순히 덮어씌우는 것이 아닙니다.
- 기존에 입력된 수업을 완전히 **삭제**한 뒤, 새롭게 개설할 교과/과목 정보를 나이스에 정확하게 재입력해야 오류 없이 정상 반영됩니다.

----- 3. 학교생활기록부 행정정보공유 연계시스템 운영 계획 (학생 주소 현행화) -----
[개요 및 목적]
- 학교생활기록부(학생부) 학생 인적사항 중 '주소 관리'와 관련하여, 담임교사의 수작업 주소 입력 업무를 대폭 경감하고 학부모가 주민등록 등·초본을 학교에 제출해야 하는 번거로움을 완전히 해소하기 위해 나이스와 주민등록정보시스템을 연계 운영합니다.

[연계 요청 및 조회 일정 (2026학년도)]
- 연계 주기는 연 2회(1학기 초 진급 및 입학 후, 2학기 초) 실시하며, 단위 학교에서 임의로 불참 처리를 할 수 없습니다.
- **1학기**: 자료 요청 기간: 3월 3일(화) ~ 4월 3일(금) / 주소 조회 및 반영 가능 기간: 4월 20일(월)부터
- **2학기**: 자료 요청 기간: 9월 1일(화) ~ 10월 2일(금) / 주소 조회 및 반영 가능 기간: 10월 19일(월)부터

[사전 동의서 수합 절차 및 기한]
- 행정정보 공동이용은 사전 동의서(서식)에 동의 서명/날인을 완료한 학생에 한해서만 정보 조회가 실시됩니다.
- 담임교사는 학급 학생 전원에게 '행정정보 공동이용 사전 동의서'를 배부하여 이번 주 금요일까지 한 명도 빠짐없이 수합해야 합니다.
- 수합된 동의서는 학년별로 가지런히 모아서 4학년 3반(나이스 담당교사 김영남)으로 제출합니다.
- 만일 학부모가 행정정보 공동이용에 동의하지 않을 경우, 불이익은 전혀 없으나 학부모가 직접 주민등록 등·초본 실물 서류를 학교에 발급받아 제출해 주어야 합니다.
- 외국인 학생(주민등록번호 뒷자리 첫 숫자가 1, 2, 3, 4가 아닌 경우)은 주민등록시스템에서 관리되지 않아 연계 대상자에서 제외(비활성화)됩니다.

[상세 업무 절차 및 나이스 메뉴 경로]
1단계: 학생 주소 정보 요청
- 메뉴 경로: **[학적] – [기본학적관리] – [학생주소연계] > [연계대상자관리]**
- 처리 방법:
  1) 조회 조건(학년/반) 선택 후 {조회} 버튼을 클릭합니다.
  2) 주소 정보를 요청할 학생들을 체크박스에서 선택합니다.
  3) 상단의 {승인 및 자료요청} 버튼을 클릭합니다.
  4) {기안문서상신} 팝업 화면이 뜨면 결재선을 올바르게 지정합니다.
  5) 기안 내용의 학생 목록을 재확인한 뒤 {상신} 버튼을 클릭하여 내부결재를 올립니다.
  ※ 연계요청기간 내에 최종 학교장 결재(승인)가 완료된 학생 건만 실제 행정안전부로 연계 요청이 정상 접수됩니다.

2단계: 회신된 주소 정보 확인 및 반영
- 메뉴 경로: **[학적] - [기본학적관리] - [학생주소연계] > [연계결과 확인 및 반영]**
- 처리 방법:
  1) 조회 조건 선택 후 {조회}를 클릭합니다.
  2) 나이스 학적 주소와 주민등록 연계 수신 주소를 자동 대조합니다.
     - 나이스 주소와 연계 수신 주소가 **일치하는 경우**: '주소'가 검은색으로 표시되며 자료반영을 선택할 수 없도록 비활성화됩니다.
     - 나이스 주소와 연계 수신 주소가 **다른 경우**: '주소'가 **붉은색(빨간색)**으로 표시되고 체크박스가 활성화됩니다.
  3) 주소가 다르게 나와 붉은색으로 표시된 학생들을 체크합니다.
  4) 상단의 {자료반영} 버튼을 클릭합니다. 반영 완료 시 주소가 '주소(연계수신자료)'의 최신 주소로 덮어씌워지며 붉은색 글씨가 검은색으로 변경됩니다.
  ※ 반영 완료된 학생 주소는 **[학적] - [기본학적관리] - [기본신상관리] > [누가주소등록]** 탭에서 조회 및 최종 수정할 수 있습니다.

3단계: 이력 확인 및 현황 모니터링
- 담임교사 조회 경로: **[학적] - [기본학적관리] - [학생주소연계이력조회]** 에서 요청일시, 전송결과(조회성공/실패) 등 이력 확인.
- 학교 관리자 모니터링 경로: **[학적] - [기본학적관리] - [학생주소연계조회현황]** 메뉴에서 교내 사용자별 주소 연계 요청/수신/반영 통계 조회 및 이력 상세 모니터링.

----- 4. 나이스 4세대 부서별 권한관리 계획 (진안초 기준 업무분장 매칭) -----

// ===== 관련 청크 검색 (키워드 기반 RAG) =====
function retrieveRelevantChunks(query, maxChars = 3500) {
  if (!knowledgeBase) return '(지식베이스 없음)';

  const chunks = knowledgeBase
    .split(/\n{2,}|(?=\[파일:|-----)/)
    .map(c => c.trim())
    .filter(c => c.length > 20);

  const rawTokens = query
    .replace(/[?！？!,./~`@#$%^&*()_+={}\[\]|\\:;"'<>-]/g, ' ')
    .split(/\s+/)
    .map(w => w.trim())
    .filter(w => w.length > 0);

  const keywords = new Set();
  
  rawTokens.forEach(token => {
    if (token.length >= 2) {
      keywords.add(token.toLowerCase());
      
      if (token.length > 2) {
        const base = token.replace(/(은|는|이|가|을|를|의|에|에서|로|으로|과|와|도|에서|까지|사항|에대해|대해서)$/, '');
        if (base.length >= 2) {
          keywords.add(base.toLowerCase());
        }
      }
      
      if (token.length >= 4) {
        const half = Math.floor(token.length / 2);
        const part1 = token.substring(0, half);
        const part2 = token.substring(half);
        if (part1.length >= 2) keywords.add(part1.toLowerCase());
        if (part2.length >= 2) keywords.add(part2.toLowerCase());
      }
    } else if (token.length === 1 && /\d/.test(token)) {
      keywords.add(token);
    }
  });

  const keywordList = Array.from(keywords);

  const scored = chunks.map(chunk => {
    const lc = chunk.toLowerCase();
    const noSpaceLc = lc.replace(/\s+/g, '');
    let score = 0;
    
    keywordList.forEach(kw => {
      const count = (lc.match(new RegExp(escapeRegExp(kw), 'g')) || []).length;
      score += count * 2;
      
      const kwNoSpace = kw.replace(/\s+/g, '');
      if (kwNoSpace.length >= 2) {
        const countNoSpace = (noSpaceLc.match(new RegExp(escapeRegExp(kwNoSpace), 'g')) || []).length;
        const diff = Math.max(0, countNoSpace - count);
        score += diff * 1;
      }
    });
    return { chunk, score };
  });

  scored.sort((a, b) => b.score - a.score);
  
  let result = '';
  for (const { chunk, score } of scored) {
    if (score === 0) continue;
    if (result.length + chunk.length > maxChars) break;
    result += chunk + '\n\n';
  }
  return result.trim() || knowledgeBase.substring(0, maxChars);
}

function escapeRegExp(string) {
  return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function buildSystemPrompt(query = '') {
  const context = retrieveRelevantChunks(query, 3500);
  return `당신은 대한민국 초등학교 교사들을 위한 '나이스 도우미' AI 챗봇입니다.
학교생활기록부 업무담당자 역량강화 연수 자료 및 나이스 실무 매뉴얼을 학습한 전문 안내 챗봇입니다.

[절대 준수 원칙 — 반드시 지킬 것]
1. 반드시 아래 [참고 자료] 안에 있는 내용만을 근거로 답변합니다.
2. [참고 자료]에 없는 내용은 절대로 추측하거나 인터넷 검색, 일반 상식으로 답변하지 않습니다.
3. [참고 자료]에 없는 내용을 질문받으면: "제공된 자료에서 해당 내용을 찾을 수 없습니다. 교내 나이스 담당자 또는 교육청 헬프데스크(1544-0079)에 문의해 주세요."라고 정중히 안내합니다.
4. 항상 존댓말을 사용합니다.
5. 답변 시 한자(漢字)를 절대 사용하지 마십시오. 모든 단어는 한글로만 작성하고, 한문 혼용이나 괄호 안에 한자를 병기하는 것(예: 학적(學籍) -> 학적)을 절대 금지합니다.

[답변 형식 — 입력 방법·경로 질문 시]
입력 방법, 처리 절차, 메뉴 경로를 질문받은 경우 반드시 아래 형식으로 답변하세요:
1. 📍 **나이스 메뉴 경로**: **[대메뉴] > [중메뉴] > [소메뉴]** 형태로 전체 경로를 굵게 표시
2. 🛠️ **단계별 처리 절차**: 1번부터 순서대로 클릭·입력 단계를 상세히 설명
3. ⚠️ **주의사항**: 실수하기 쉬운 점, 마감 기한, 결재 라인 등 강조

[답변 형식 — 개념·규정 질문 시]
자료에 근거한 정확한 내용만 안내하고, 출처가 불분명한 내용은 언급하지 않습니다.

[참고 자료]
${context || '(로드된 자료가 없습니다.)'}

위 [참고 자료] 범위 안에서만 답변하고, 자료에 없으면 "제공된 자료에 없는 내용입니다."라고 정직하게 안내하세요.`;
}

// ===== GROQ API =====
async function callGroq(messagesBody, keyIndex = currentKeyIndex, tried = 0) {
  const key = API_KEYS[keyIndex];
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${key}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: messagesBody,
      temperature: 0.3,
      max_tokens: 1500
    })
  });
  const data = await res.json();
  if (!res.ok) {
    const msg = data.error?.message || '';
    if (res.status === 429) {
      // 다음 키로 자동 전환
      const nextIndex = (keyIndex + 1) % API_KEYS.length;
      if (tried < API_KEYS.length - 1) {
        currentKeyIndex = nextIndex;
        updateTyping(`⏳ API 키 ${keyIndex + 1} 한도 초과 → 키 ${nextIndex + 1}로 자동 전환 중...`);
        await new Promise(r => setTimeout(r, 1000));
        return callGroq(messagesBody, nextIndex, tried + 1);
      } else {
        // 모든 키 한도 초과 → 잠시 대기 후 첫 번째 키로 재시도
        updateTyping(`⏳ 전체 API 한도 임시 초과. 10초 대기 후 재시도 중...`);
        await new Promise(r => setTimeout(r, 10000));
        return callGroq(messagesBody, 0, 0);
      }
    }
    throw new Error(msg || `API 오류 (${res.status})`);
  }
  return data;
}


function updateKbStatus(html) {
  const el = document.getElementById('kb-status');
  if (el) el.innerHTML = html;
}

// ===== CHAT UI =====
function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMsg(role, text) {
  const area = document.getElementById('chat-area');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg-bubble flex gap-3 ${isUser ? 'justify-end' : 'justify-start'}`;
  const formatted = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong class="text-brand-300">$1</strong>')
    .replace(/\n/g,'<br>');
  if (isUser) {
    div.innerHTML = `<div class="max-w-lg bg-gradient-to-br from-brand-600 to-brand-700 text-white text-sm px-4 py-3 rounded-2xl rounded-tr-sm leading-relaxed">${formatted}</div>`;
  } else {
    div.innerHTML = `
      <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0 mt-1">🏫</div>
      <div class="max-w-2xl bg-dark-700 border border-slate-800 text-slate-200 text-sm px-4 py-3 rounded-2xl rounded-tl-sm leading-relaxed prose-bot">${formatted}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.id = 'typing-el';
  div.className = 'flex gap-3 items-start';
  div.innerHTML = `
    <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0">🏫</div>
    <div id="typing-content" class="bg-dark-700 border border-slate-800 px-4 py-3 rounded-2xl rounded-tl-sm flex gap-1.5 items-center">
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function updateTyping(msg) {
  const el = document.getElementById('typing-content');
  if (el) el.innerHTML = `<span class="text-xs text-slate-400">${msg}</span>`;
}

// ===== SEND MESSAGE =====
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  removeWelcome();
  input.value = '';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text);
  messages.push({ role: 'user', content: text });
  showTyping();

  try {
    const systemPrompt = buildSystemPrompt(text);
    const apiMessages = [
      { role: 'system', content: systemPrompt },
      ...messages
    ];
    updateTyping('🤖 AI 분석 중...');
    const data = await callGroq(apiMessages);
    let reply = data.choices?.[0]?.message?.content || '';

    const tEl = document.getElementById('typing-el');
    if (tEl) tEl.remove();

    if (!reply) {
      reply = '응답을 받을 수 없습니다.';
    }

    messages.push({ role: 'assistant', content: reply });
    appendMsg('bot', reply);
    if (messages.length === 2) saveHistory(text);
  } catch(e) {
    const tEl = document.getElementById('typing-el');
    if (tEl) tEl.remove();
    appendMsg('bot', `⚠️ 오류: ${e.message}\n\n잠시 후 다시 시도해 주세요.`);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

function sendSuggestion(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

// ===== HISTORY =====
function saveHistory(title) {
  historyList.unshift({ id: Date.now(), title: title.substring(0, 22), msgs: [...messages] });
  if (historyList.length > 30) historyList.pop();
  localStorage.setItem('neis_history', JSON.stringify(historyList));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!historyList.length) {
    list.innerHTML = '<p class="text-xs text-slate-600 px-2 py-2">저장된 대화가 없습니다.</p>';
    return;
  }
  list.innerHTML = historyList.map((h, i) => `
    <div class="history-item flex items-center gap-2 px-3 py-2 rounded-xl cursor-pointer text-xs text-slate-400" onclick="loadHistory(${i})">
      <span class="text-brand-500">💬</span>
      <span class="truncate">${h.title}</span>
    </div>`).join('');
}

function loadHistory(i) {
  const h = historyList[i];
  messages = [...h.msgs].map(m => {
    const text = m.content || m.parts?.[0]?.text || '';
    const role = m.role === 'user' ? 'user' : 'assistant';
    return { role, content: text };
  });
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  messages.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'bot', m.content));
  if (window.innerWidth < 768) closeSidebar();
}

function clearHistory() {
  if (confirm('이전 대화 목록을 모두 삭제하시겠습니까?')) {
    historyList = [];
    localStorage.removeItem('neis_history');
    renderHistory();
    newChat();
  }
}

function toggleSidebar() {

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');

// ===== PDF 파싱 및 연동 =====
async function loadPDFManuals() {
  const pdfFiles = [
    'pdfs/2026 학교생활기록부 기재요령(초등학교).pdf',
    'pdfs/2026 화성오산 초등 상반기 학교생활기록부 업무담당자 역량강화 연수(공유).pdf',
    'pdfs/2026학년도 학교생활기록부 기재 길라잡이(초등학교).pdf',
    'pdfs/2026학년도 나이스 교무업무 학기말 사용자 연수 자료(초등학교)_0612.pdf',
    'pdfs/2026학년도 나이스 교무업무 학기말 업무처리 체크리스트(초등학교)_0612.pdf'
  ];
  
  updateKbStatus(`<span class="text-yellow-400 animate-pulse">⏳ PDF 매뉴얼 로딩 및 분석 중...</span>`);
  let extractedText = '\n\n===== PDF 매뉴얼 내용 =====\n';
  let loadedCount = 0;

  for (const file of pdfFiles) {
    try {
      const loadingTask = pdfjsLib.getDocument(file);
      const pdf = await loadingTask.promise;
      
      let fullText = '';
      // 페이지가 많아 브라우저가 멈추는 것을 방지하기 위해 각 페이지마다 잠시 대기
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += pageText + '\n';
        if (i % 10 === 0) await new Promise(r => setTimeout(r, 10)); // UI 블로킹 방지
      }
      extractedText += `\n[파일: ${file.replace('pdfs/', '')}]\n` + fullText;
      loadedCount++;
    } catch (e) {
      console.error(`PDF 로드 실패 (${file}):`, e);
    }
  }

  if (loadedCount > 0) {
    knowledgeBase += extractedText;
    updateKbStatus(`<span class="text-green-400">✅ 매뉴얼 내장 및 PDF 연동 완료 (${loadedCount}개)</span>`);
    const countEl = document.getElementById('kb-file-count');
    if (countEl) countEl.textContent = `📂 매뉴얼 연동됨 (PDF ${loadedCount}개 포함)`;
  } else {
    updateKbStatus(`<span class="text-green-400">✅ 매뉴얼 내장 완료 (PDF 제외)</span>`);
  }
}

  if (window.pdfjsLib) {
    loadPDFManuals();
  }
};
