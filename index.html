// ===== 관련 청크 검색 (키워드 기반 RAG) =====
function retrieveRelevantChunks(query, maxChars = 7000) {
  if (!knowledgeBase) return '(지식베이스 없음)';

  const chunks = knowledgeBase
    .split(/\n{2,}|(?=\[파일:|-----)/)
    .map(c => c.trim())
    .filter(c => c.length > 20);

  const keywords = query
    .replace(/[?！？!]/g, '')
    .split(/\s+/)
    .filter(w => w.length >= 2);

  const scored = chunks.map(chunk => {
    const lc = chunk.toLowerCase();
    const score = keywords.reduce((s, kw) => {
      const count = (lc.match(new RegExp(kw.toLowerCase(), 'g')) || []).length;
      return s + count;
    }, 0);
    return { chunk, score };
  });

  scored.sort((a, b) => b.score - a.score);
  let result = '';
  // 만약 일치하는 키워드가 없더라도(전체 score=0), 최대한 많은 컨텍스트를 제공하도록 제한을 풉니다.
  for (const { chunk } of scored) {
    if (result.length + chunk.length > maxChars) break;
    result += chunk + '\n\n';
  }
  return result.trim() || knowledgeBase.substring(0, maxChars);
}

function buildSystemPrompt(query = '') {
  const context = retrieveRelevantChunks(query, 7000);
  return `당신은 대한민국 초등학교 교사를 위한 '나이스 도우미' AI 챗봇입니다.

// ===== GROQ API =====
async function callGroq(messagesBody, retry = 0) {
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${API_KEY}`
    },
    body: JSON.stringify({
      model: 'llama-3.3-70b-versatile',
      messages: messagesBody,
      temperature: 0.3,
      max_tokens: 1500
    })
  });
  const data = await res.json();
  if (!res.ok) {
    const msg = data.error?.message || '';
    if (res.status === 429 && retry < 2) {
      updateTyping(`⏳ API 요청 한도 초과. 잠시 후 재시도합니다...`);
      await new Promise(r => setTimeout(r, 5000));
      return callGroq(messagesBody, retry + 1);
    }
    throw new Error(msg || `API 오류 (${res.status})`);
  }
  return data;
}

function updateKbStatus(html) {
  const el = document.getElementById('kb-status');
  if (el) el.innerHTML = html;
}

// ===== CHAT UI =====
function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMsg(role, text) {
  const area = document.getElementById('chat-area');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg-bubble flex gap-3 ${isUser ? 'justify-end' : 'justify-start'}`;
  const formatted = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong class="text-brand-300">$1</strong>')
    .replace(/\n/g,'<br>');
  if (isUser) {
    div.innerHTML = `<div class="max-w-lg bg-gradient-to-br from-brand-600 to-brand-700 text-white text-sm px-4 py-3 rounded-2xl rounded-tr-sm leading-relaxed">${formatted}</div>`;
  } else {
    div.innerHTML = `
      <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0 mt-1">🏫</div>
      <div class="max-w-2xl bg-dark-700 border border-slate-800 text-slate-200 text-sm px-4 py-3 rounded-2xl rounded-tl-sm leading-relaxed prose-bot">${formatted}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.id = 'typing-el';
  div.className = 'flex gap-3 items-start';
  div.innerHTML = `
    <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0">🏫</div>
    <div id="typing-content" class="bg-dark-700 border border-slate-800 px-4 py-3 rounded-2xl rounded-tl-sm flex gap-1.5 items-center">
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function updateTyping(msg) {
  const el = document.getElementById('typing-content');
  if (el) el.innerHTML = `<span class="text-xs text-slate-400">${msg}</span>`;
}

// ===== SEND MESSAGE =====
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  removeWelcome();
  input.value = '';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text);
  messages.push({ role: 'user', content: text });
  showTyping();

  try {
    const systemPrompt = buildSystemPrompt(text);
    const apiMessages = [
      { role: 'system', content: systemPrompt },
      ...messages
    ];
    const data = await callGroq(apiMessages);
    const tEl = document.getElementById('typing-el');
    if (tEl) tEl.remove();
    const reply = data.choices?.[0]?.message?.content || '응답을 받을 수 없습니다.';
    messages.push({ role: 'assistant', content: reply });
    appendMsg('bot', reply);
    if (messages.length === 2) saveHistory(text);
  } catch(e) {
    const tEl = document.getElementById('typing-el');
    if (tEl) tEl.remove();
    appendMsg('bot', `⚠️ 오류: ${e.message}\n\n잠시 후 다시 시도해 주세요.`);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

function sendSuggestion(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

// ===== HISTORY =====
function saveHistory(title) {
  historyList.unshift({ id: Date.now(), title: title.substring(0, 22), msgs: [...messages] });
  if (historyList.length > 30) historyList.pop();
  localStorage.setItem('neis_history', JSON.stringify(historyList));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!historyList.length) {
    list.innerHTML = '<p class="text-xs text-slate-600 px-2 py-2">저장된 대화가 없습니다.</p>';
    return;
  }
  list.innerHTML = historyList.map((h, i) => `
    <div class="history-item flex items-center gap-2 px-3 py-2 rounded-xl cursor-pointer text-xs text-slate-400" onclick="loadHistory(${i})">
      <span class="text-brand-500">💬</span>
      <span class="truncate">${h.title}</span>
    </div>`).join('');
}

function loadHistory(i) {
  const h = historyList[i];
  messages = [...h.msgs].map(m => {
    const text = m.content || m.parts?.[0]?.text || '';
    const role = m.role === 'user' ? 'user' : 'assistant';
    return { role, content: text };
  });
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  messages.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'bot', m.content));
  if (window.innerWidth < 768) closeSidebar();
}
