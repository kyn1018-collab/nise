<script>
// ===== CONFIG =====
const API_KEY = 'AIzaSyC5Bc5ie8yo-B98VEP11ehtcNgsOUW2zzc';
const DATA_FILES = [
  'data/나이스_기본업무_안내.txt',
];

// ===== STATE =====
let messages = [];
let historyList = JSON.parse(localStorage.getItem('neis_history') || '[]');
let knowledgeBase = '';
let isLoading = false;

// ===== KNOWLEDGE BASE LOADER =====
async function loadKnowledgeBase() {
  const results = [];
  let loaded = 0;
  for (const file of DATA_FILES) {
    try {
      const res = await fetch(file);
      if (res.ok) {
        const text = await res.text();
        results.push(`[파일: ${file}]\n${text}`);
        loaded++;
      }
    } catch(e) {
      console.warn('파일 로드 실패:', file);
    }
  }
  knowledgeBase = results.join('\n\n---\n\n');
  const el = document.getElementById('kb-status');
  const countEl = document.getElementById('kb-file-count');
  if (loaded > 0) {
    el.innerHTML = `<span class="text-green-400">✅ 지식베이스 ${loaded}개 로드 완료</span>`;
    countEl.textContent = `📂 참고자료 ${loaded}개`;
  } else {
    el.innerHTML = `<span class="text-yellow-400">⚠️ 내장 지식으로 답변</span>`;
    countEl.textContent = '';
  }
}

function buildSystemPrompt() {
  return `당신은 대한민국 초등학교 교사를 위한 '나이스 도우미' AI 챗봇입니다.
반드시 아래 [지식베이스] 내용을 기반으로만 답변하세요.
지식베이스에 없는 내용은 "해당 내용은 나이스 매뉴얼이나 교육청 담당자에게 문의하시기 바랍니다."라고 안내하세요.

답변 형식:
1. 먼저 **메뉴 경로**를 굵게 표시 (예: **나이스 로그인 → 교무업무 → 출결관리 → 일별출결관리**)
2. 단계별 처리 절차를 번호 목록으로 안내
3. 유의사항이 있으면 별도로 명시
4. 답변 마지막에 출처(파일명) 명시

[지식베이스]
${knowledgeBase || '(파일 로드 실패 - 내장 지식으로 답변합니다)'}

[내장 기본 지식]
- 나이스 로그인: https://neis.go.kr → 공인인증서 또는 간편인증
- 출결관리: 교무업무 → 출결관리 → 일별출결관리
- 성적관리: 교무업무 → 성적관리 → 교과학습발달상황
- 학적관리: 교무업무 → 학적관리
- 창체활동: 교무업무 → 창의적체험활동
- 학생부: 교무업무 → 학교생활기록부
- 복무관리: 행정업무 → 복무관리
- 헬프데스크: 1544-0079`;
}

// ===== GEMINI API =====
async function callGemini(body, retry = 0) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
  );
  const data = await res.json();
  if (data.error) {
    if (res.status === 429 && retry < 3) {
      const match = (data.error.message || '').match(/retry in ([\d.]+)s/i);
      const wait = match ? Math.ceil(parseFloat(match[1])) + 1 : 15;
      updateTyping(`⏳ 잠시 후 재시도합니다... (${wait}초)`);
      await new Promise(r => setTimeout(r, wait * 1000));
      return callGemini(body, retry + 1);
    }
    throw new Error(data.error.message || 'API 오류');
  }
  return data;
}

// ===== CHAT UI =====
function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMsg(role, text) {
  const area = document.getElementById('chat-area');
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg-bubble flex gap-3 ${isUser ? 'justify-end' : 'justify-start'}`;
  const formatted = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong class="text-brand-300">$1</strong>')
    .replace(/\n/g,'<br>');
  if (isUser) {
    div.innerHTML = `<div class="max-w-lg bg-gradient-to-br from-brand-600 to-brand-700 text-white text-sm px-4 py-3 rounded-2xl rounded-tr-sm leading-relaxed">${formatted}</div>`;
  } else {
    div.innerHTML = `
      <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0 mt-1">🏫</div>
      <div class="max-w-2xl bg-dark-700 border border-purple-900/30 text-slate-200 text-sm px-4 py-3 rounded-2xl rounded-tl-sm leading-relaxed prose-bot">${formatted}</div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function showTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.id = 'typing-el';
  div.className = 'flex gap-3 items-start';
  div.innerHTML = `
    <div class="w-8 h-8 rounded-xl bg-dark-600 flex items-center justify-center text-base shrink-0">🏫</div>
    <div id="typing-content" class="bg-dark-700 border border-purple-900/30 px-4 py-3 rounded-2xl rounded-tl-sm flex gap-1.5 items-center">
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
      <span class="typing-dot w-2 h-2 bg-brand-400 rounded-full inline-block"></span>
    </div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function updateTyping(msg) {
  const el = document.getElementById('typing-content');
  if (el) el.innerHTML = `<span class="text-xs text-slate-400">${msg}</span>`;
}

function hideTyping() {
  const t = document.getElementById('typing-el');
  if (t) t.remove();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;

  removeWelcome();
  input.value = '';
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  appendMsg('user', text);
  messages.push({ role: 'user', parts: [{ text }] });
  showTyping();

  try {
    const body = {
      system_instruction: { parts: [{ text: buildSystemPrompt() }] },
      contents: messages,
      generationConfig: { temperature: 0.2, maxOutputTokens: 1500 }
    };
    const data = await callGemini(body);
    hideTyping();
    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '응답을 받을 수 없습니다.';
    messages.push({ role: 'model', parts: [{ text: reply }] });
    appendMsg('bot', reply);
    if (messages.length === 2) saveHistory(text);
  } catch(e) {
    hideTyping();
    appendMsg('bot', `⚠️ 오류: ${e.message}\n\n잠시 후 다시 시도해 주세요.`);
  } finally {
    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('msg-input').focus();
  }
}

function sendSuggestion(text) {
  document.getElementById('msg-input').value = text;
  sendMessage();
}

// ===== HISTORY =====
function saveHistory(title) {
  historyList.unshift({ id: Date.now(), title: title.substring(0, 22), msgs: [...messages] });
  if (historyList.length > 30) historyList.pop();
  localStorage.setItem('neis_history', JSON.stringify(historyList));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  if (!historyList.length) {
    list.innerHTML = '<p class="text-xs text-slate-600 px-2 py-2">저장된 대화가 없습니다.</p>';
    return;
  }
  list.innerHTML = historyList.map((h, i) => `
    <div class="history-item flex items-center gap-2 px-3 py-2 rounded-xl cursor-pointer text-xs text-slate-400" onclick="loadHistory(${i})">
      <span class="text-brand-500">💬</span>
      <span class="truncate">${h.title}</span>
    </div>`).join('');
}

function loadHistory(i) {
  const h = historyList[i];
  messages = [...h.msgs];
  const area = document.getElementById('chat-area');
  area.innerHTML = '';
  messages.forEach(m => appendMsg(m.role === 'user' ? 'user' : 'bot', m.parts[0].text));
  if (window.innerWidth < 768) closeSidebar();
}

function newChat() {
  messages = [];
  const area = document.getElementById('chat-area');
  area.innerHTML = `
  <div id="welcome" class="flex flex-col items-center justify-center h-full text-center gap-6 pt-10">
    <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-600 to-brand-800 flex items-center justify-center text-4xl shadow-2xl glow">🏫</div>
    <div>
      <h2 class="text-2xl font-bold text-white mb-2">나이스 도우미</h2>
      <p class="text-slate-400 text-sm max-w-md leading-relaxed">나이스(NEIS) 교무업무 처리 절차를 안내해드립니다.<br>매뉴얼 기반으로 정확한 메뉴 경로와 입력 방법을 알려드려요.</p>
    </div>
    <div id="suggestions" class="grid grid-cols-2 gap-3 w-full max-w-xl mt-2">
      <button class="suggestion-card bg-dark-700 rounded-2xl p-4 text-left cursor-pointer" onclick="sendSuggestion('출석부 처리는 어떻게 하나요? 나이스 메뉴 경로와 입력 절차를 알려주세요.')">
        <div class="text-2xl mb-2">📋</div><strong class="text-sm text-white block mb-1">출결 관리</strong><span class="text-xs text-slate-500">결석·지각·조퇴 입력 절차</span>
      </button>
      <button class="suggestion-card bg-dark-700 rounded-2xl p-4 text-left cursor-pointer" onclick="sendSuggestion('성적 처리는 어떻게 하나요? 단원평가 점수 입력과 통지표 출력 방법을 알려주세요.')">
        <div class="text-2xl mb-2">📝</div><strong class="text-sm text-white block mb-1">성적 처리</strong><span class="text-xs text-slate-500">점수 입력·통지표 출력</span>
      </button>
      <button class="suggestion-card bg-dark-700 rounded-2xl p-4 text-left cursor-pointer" onclick="sendSuggestion('창의적 체험활동 입력은 어떻게 하나요? 자율·동아리·봉사·진로 활동 입력 방법을 알려주세요.')">
        <div class="text-2xl mb-2">🎨</div><strong class="text-sm text-white block mb-1">창체 활동 입력</strong><span class="text-xs text-slate-500">자율·동아리·봉사·진로</span>
      </button>
      <button class="suggestion-card bg-dark-700 rounded-2xl p-4 text-left cursor-pointer" onclick="sendSuggestion('학생부 행동특성 및 종합의견은 어떻게 입력하나요? 나이스 메뉴 경로와 작성 방법을 알려주세요.')">
        <div class="text-2xl mb-2">📚</div><strong class="text-sm text-white block mb-1">학교생활기록부</strong><span class="text-xs text-slate-500">학생부 항목 입력 안내</span>
      </button>
    </div>
  </div>`;
  if (window.innerWidth < 768) closeSidebar();
}

// ===== SIDEBAR =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ===== INIT =====
window.onload = async () => {
  renderHistory();
  await loadKnowledgeBase();
  document.getElementById('msg-input').focus();
};
</script>
